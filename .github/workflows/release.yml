name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo publish -p tribewarez-staking --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: cargo publish -p tribewarez-vault --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: cargo publish -p tribewarez-swap --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: cargo publish -p tribewarez-pot-o --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - uses: softprops/action-gh-release@v2
        if: success()
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
