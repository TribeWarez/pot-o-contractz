name: Auto Tag

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tag
        id: create-tag
        run: |
          VERSION="v$(grep -m1 '^version' tribewarez-pot-o/Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Tag $VERSION created and pushed."
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger release workflow
        if: steps.create-tag.outputs.created == 'true'
        run: gh workflow run release.yml --ref "${{ steps.create-tag.outputs.version }}" -f tag="${{ steps.create-tag.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
